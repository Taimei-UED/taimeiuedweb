<head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Textarea, Search, Checkbox } = window.WizIDMDesignSystem_42e9e3;
function Demo(){
  const [showReq, setShowReq] = React.useState(true);
  return (
    <div style={{display:'flex', flexDirection:'column', gap:18}}>
      <div style={{display:'flex', alignItems:'center', gap:16, padding:'10px 14px', background:'var(--grey-20)', borderRadius:'var(--radius-md)'}}>
        <span style={{fontFamily:'var(--font-ui)', fontSize:12, fontWeight:700, letterSpacing:'.04em', textTransform:'uppercase', color:'var(--grey-70)'}}>Tweaks</span>
        <Checkbox state={showReq ? 'checked' : 'unchecked'} label="Show required *" onChange={()=>setShowReq(v=>!v)} />
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:24,alignItems:'start'}}>
        <Input label="Input title" required={showReq} placeholder="Input..." />
        <Input label="Input title" required={showReq} error="Error Message" defaultValue="Content" />
        <Input label="Disabled" disabled defaultValue="Read only" />
        <Search width="100%" />
        <Textarea label="Description" placeholder="Multi-line input..." style={{gridColumn:'span 2'}} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
<script src="../../theme-toggle.js"></script>
