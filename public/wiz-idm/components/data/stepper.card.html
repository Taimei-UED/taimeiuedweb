<!-- @dsCard group="8 Navigation" viewport="728x440" name="Stepper" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:24px;background:var(--surface-card);}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Steps, StepItem } = window.WizIDMDesignSystem_42e9e3;
function Demo(){
  const steps=[
    {label:'Import data',description:'Source uploaded'},
    {label:'Run checks',description:'In progress'},
    {label:'Resolve queries',description:'9 open'},
    {label:'Sign off',description:'Locked'},
  ];
  const Lbl = ({children})=> <span style={{fontFamily:'var(--font-ui)',fontSize:11,fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase',color:'var(--grey-70)'}}>{children}</span>;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:22}}>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Lbl>Step Item — states (completed · active · loading · upcoming · check)</Lbl>
        <div style={{display:'flex',gap:32,flexWrap:'wrap'}}>
          <StepItem status="completed" number={1} label="Completed" description="Done" />
          <StepItem status="active" number={2} label="Active" description="Current step" selected />
          <StepItem status="loading" number={3} label="Loading" description="In progress" selected />
          <StepItem status="upcoming" number={4} label="Upcoming" description="Not started" />
          <StepItem status="completed" number={5} label="Completed" description="Check icon" checkCompleted />
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Lbl>Stepper — step 2 active (completed · active · upcoming)</Lbl>
        <Steps current={1} steps={steps} />
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Lbl>In progress — active step shows a spinner</Lbl>
        <Steps current={1} loading checkCompleted steps={steps} />
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Lbl>Vertical</Lbl>
        <Steps current={2} orientation="vertical" steps={steps.slice(0,3)} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
<script src="../../theme-toggle.js"></script>
</body>
</html>
