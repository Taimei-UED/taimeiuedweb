<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:24px;background:var(--surface-card);}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Badge } = window.WizIDMDesignSystem_42e9e3;
const Lbl = ({children})=> <span style={{fontFamily:'var(--font-ui)',fontSize:11,fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase',color:'var(--grey-70)'}}>{children}</span>;
function Demo(){
  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Lbl>Tones — soft fill</Lbl>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <Badge tone="purple">Status</Badge>
          <Badge tone="green">Active</Badge>
          <Badge tone="red">Error</Badge>
          <Badge tone="yellow">Pending</Badge>
          <Badge tone="blue">Review</Badge>
          <Badge tone="grey">Locked</Badge>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Lbl>Solid fill</Lbl>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <Badge tone="green" variant="solid">Status</Badge>
          <Badge tone="blue" variant="solid">Active</Badge>
          <Badge tone="red" variant="solid">Error</Badge>
          <Badge tone="yellow" variant="solid">Pending</Badge>
          <Badge tone="purple" variant="solid">Review</Badge>
          <Badge tone="grey" variant="solid">Locked</Badge>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Lbl>Variants — outline · dot</Lbl>
        <div style={{display:'flex',gap:14,flexWrap:'wrap',alignItems:'center'}}>
          <Badge tone="blue" variant="outline">Draft</Badge>
          <Badge tone="red" variant="outline">Overdue</Badge>
          <Badge tone="green" variant="dot">Synced</Badge>
          <Badge tone="yellow" variant="dot">Syncing</Badge>
          <Badge tone="grey" variant="dot">Offline</Badge>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
<script src="../../theme-toggle.js"></script>
</body>
</html>
