<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:24px;background:var(--surface-page);}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { TitleBar, Button, Switch } = window.WizIDMDesignSystem_42e9e3;
const Lbl = ({children})=> <span style={{fontFamily:'var(--font-ui)',fontSize:11,fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase',color:'var(--grey-70)'}}>{children}</span>;
const Actions = ()=> <><Button variant="normal" icon="UploadLine">Export</Button><Button variant="primary" icon="Sparkling2Fill">Auto-check</Button></>;
function Demo(){
  const [line,setLine] = React.useState(true);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      <Switch checked={line} onChange={setLine} label="Show bottom divider" />
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Lbl>1 · Title + buttons</Lbl>
        <TitleBar title="Manual Check" divider={line} actions={<Actions/>} />
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Lbl>2 · Title + description + buttons</Lbl>
        <TitleBar title="Manual Check" description="Review and resolve queries before database lock" divider={line} actions={<Actions/>} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
<script src="../../theme-toggle.js"></script>
</body>
</html>
