<!-- @dsCard group="1 Tokens" viewport="728x560" name="Colors" subtitle="Main · brand blue · grey · 8 accent ramps — live token values per mode" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-ui);}
  h3{margin:0 0 8px;font-size:18px;font-weight:700;color:var(--grey-90);}
  .ramp{display:flex;border-radius:8px;overflow:hidden;box-shadow:var(--ring-hairline);margin-bottom:7px;}
  .sw{flex:1;min-width:0;height:74px;display:flex;flex-direction:column;justify-content:flex-start;padding:8px;box-sizing:border-box;}
  .sw b{font-size:10px;font-weight:700;line-height:1.2;}
  .sw small{font-size:8px;opacity:.9;font-weight:600;margin-top:auto;letter-spacing:0;}
</style>
</head>
<body>
<h3>Main Color</h3>
<div class="ramp" id="main"></div>

<h3 style="margin-top:16px">Brand Blue</h3>
<div class="ramp" id="blue"></div>

<h3 style="margin-top:16px">Grey</h3>
<div class="ramp" id="grey"></div>

<h3 style="margin-top:16px">Accent Color</h3>
<div id="accents"></div>

<script>
const steps=[100,90,80,70,60,50,40,30,20,10];
const accentNames=['Orange','Blue','Pink','Yellow','Red','GreenBlue','Green','Purple'];

// read a CSS custom property and normalise to #RRGGBB
const cs = () => getComputedStyle(document.documentElement);
function tokenHex(varName){
  const raw = cs().getPropertyValue(varName).trim();
  if(!raw) return '#000000';
  if(raw[0]==='#') return raw.toUpperCase();
  const m = raw.match(/rgba?\(([^)]+)\)/);
  if(m){
    const [r,g,b] = m[1].split(',').map(s=>parseInt(s,10));
    return '#'+[r,g,b].map(n=>n.toString(16).padStart(2,'0')).join('').toUpperCase();
  }
  return raw.toUpperCase();
}
const lum=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 0.299*r+0.587*g+0.114*b;};
const ink=h=>lum(h)>150?'#222':'#fff';
const cell=(name,hex)=>`<div class="sw" style="background:${hex};color:${ink(hex)}"><b>${name}</b><small>${hex}</small></div>`;

function rampFor(label, prefix){
  return steps.map(s=>{
    const hex = tokenHex('--'+prefix+'-'+s);
    return cell(label+' '+s, hex);
  }).join('');
}

function render(){
  document.getElementById('blue').innerHTML = rampFor('Brand Blue','brand-blue');
  document.getElementById('grey').innerHTML = rampFor('Grey','grey');
  document.getElementById('accents').innerHTML = accentNames.map(n=>
    `<div class="ramp">${rampFor(n, n.toLowerCase())}</div>`
  ).join('');

  // Main overview — semantic tokens, also live per mode
  const main=[
    {name:'Wiz Color', bg:'var(--grad-brand)', val:'gradient', fg:'#fff'},
    {name:'Brand Blue', tok:'--brand-blue-70'},
    {name:'Main Grey', tok:'--grey-90'},
    {name:'Surface', tok:'--surface-card'},
    {name:'BG Color', tok:'--bg-color'},
    {name:'Error', tok:'--signal-error'},
    {name:'Warning', tok:'--signal-warning'},
    {name:'Success', tok:'--signal-success'},
  ];
  document.getElementById('main').innerHTML = main.map(c=>{
    if(c.tok){ const hex=tokenHex(c.tok); return cell(c.name, hex); }
    return `<div class="sw" style="background:${c.bg};color:${c.fg}"><b>${c.name}</b><small>${c.val}</small></div>`;
  }).join('');
}

render();
// re-render whenever the theme flips (data-theme on <html> changes)
new MutationObserver(render).observe(document.documentElement, {attributes:true, attributeFilter:['data-theme']});
window.addEventListener('storage', e=>{ if(e.key==='wiz-theme') setTimeout(render, 30); });
</script>
<script src="../theme-toggle.js"></script>
</body>
</html>
