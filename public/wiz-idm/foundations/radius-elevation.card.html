<!-- @dsCard group="1 Tokens" viewport="728x440" name="Radius & Elevation" subtitle="Corner radii + elevation shadows, with usage" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-ui);color:var(--grey-90);}
  h4{margin:0 0 14px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--grey-70);}
  section{margin-bottom:26px;}
  .group{display:flex;gap:14px;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;gap:8px;width:124px;}
  .box{width:56px;height:56px;background:var(--brand-blue-10);box-shadow:inset 0 0 0 1.5px var(--brand-blue-50);}
  .elev{width:124px;height:54px;background:var(--surface-card);border-radius:14px;}
  .k{font-size:12px;font-weight:700;color:var(--grey-90);}
  .v{font-size:10px;color:var(--grey-70);font-weight:600;}
  .use{font-size:11px;color:var(--grey-70);line-height:1.4;}
  .erow{display:flex;gap:14px;flex-wrap:wrap;}
  .ecard{width:168px;display:flex;flex-direction:column;gap:8px;}
</style>
</head>
<body>
<section>
  <h4>Corner radius</h4>
  <div class="group" id="r"></div>
</section>

<section>
  <h4>Elevation</h4>
  <div class="erow" id="e"></div>
</section>
<script>
const radii=[
  ['xs',4,'Inputs, checkboxes, small chips & tags'],
  ['sm',8,'Buttons, badges, menu items, dropdowns'],
  ['md',12,'content container'],
  ['lg',16,'Modals, panels, large surface cards'],
  ['xl',24,'Hero blocks & feature containers'],
];
document.getElementById('r').innerHTML=radii.map(([k,v,use])=>
  `<div class="item">
     <div class="box" style="border-radius:${v}px"></div>
     <div class="k">${k} · ${v}px</div>
     <div class="use">${use}</div>
   </div>`
).join('');

const elev=[
  ['ring','--ring-hairline','Flat dividers — a 1px inset border, no lift. Default card edge.'],
  ['card','--shadow-card','Buttons,Components,Cards'],
  ['layout','--shadow-raised','Sticky bars, title bars & toolbars that float above scrolling content.'],
  ['pop','--shadow-pop','Dropdowns, popovers & tooltips that overlay the UI.'],
  ['modal','--shadow-modal','Dialogs & full overlays — the highest, most diffuse elevation.'],
];
document.getElementById('e').innerHTML=elev.map(([k,tok,use])=>
  `<div class="ecard">
     <div class="elev" style="box-shadow:var(${tok})"></div>
     <div class="k">${k}</div>
     <div class="use">${use}</div>
   </div>`
).join('');
</script>
<script src="../theme-toggle.js"></script>
</body>
</html>
