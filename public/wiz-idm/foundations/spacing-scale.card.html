<!-- @dsCard group="1 Tokens" viewport="728x130" name="Spacing Scale" subtitle="4px base step · xs → 4xl" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-ui);}
  .row{display:flex;align-items:flex-end;gap:18px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--brand-blue-50);border-radius:3px;width:24px;}
  .k{font-size:11px;font-weight:700;color:var(--grey-90);}
  .v{font-size:10px;color:var(--grey-70);}
</style>
</head>
<body>
<div class="row" id="r"></div>
<script>
const s=[['xs',4],['sm',8],['md',12],['lg',16],['xl',24],['2xl',32],['3xl',48],['4xl',64]];
document.getElementById('r').innerHTML=s.map(([k,v])=>
  `<div class="item"><div class="bar" style="height:${v}px"></div><div class="k">${k}</div><div class="v">${v}px</div></div>`
).join('');
</script>
<script src="../theme-toggle.js"></script>
</body>
</html>
